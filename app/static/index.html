<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>合同校审 MVP</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Contract Review MVP</p>
      <h1>合同校审演示台</h1>
      <p class="subtitle">支持粘贴合同文本或上传合同文件，直接查看风险、依据来源和修改建议。</p>
      <div class="status-bar">
        <span id="runtimeStatus">正在检查运行状态...</span>
        <a href="/docs" target="_blank" rel="noreferrer">打开 API 文档</a>
      </div>
    </section>

    <section class="workspace">
      <div class="panel input-panel">
        <h2>文本校审</h2>
        <label>
          <span>合同类型</span>
          <input id="textContractType" type="text" placeholder="例如：采购合同">
        </label>
        <label>
          <span>我方角色</span>
          <select id="textOurSide">
            <option value="甲方">甲方</option>
            <option value="乙方">乙方</option>
          </select>
        </label>
        <label>
          <span>合同文本</span>
          <textarea id="contractText" rows="14" placeholder="请粘贴合同全文..."></textarea>
        </label>
        <button id="submitText" class="primary">开始文本校审</button>
      </div>

      <div class="panel input-panel">
        <h2>文件校审</h2>
        <label>
          <span>合同类型</span>
          <input id="fileContractType" type="text" placeholder="例如：采购合同">
        </label>
        <label>
          <span>我方角色</span>
          <select id="fileOurSide">
            <option value="甲方">甲方</option>
            <option value="乙方">乙方</option>
          </select>
        </label>
        <label class="upload-box">
          <span>上传文件</span>
          <input id="contractFile" type="file" accept=".txt,.docx,.pdf">
        </label>
        <button id="submitFile" class="secondary">上传并校审</button>
        <p class="hint">支持 txt / docx / pdf，建议 5MB 以内。</p>
      </div>
    </section>

    <section class="panel result-panel">
      <div class="result-header">
        <h2>校审结果</h2>
        <span id="resultMode" class="mode-tag">等待提交</span>
      </div>
      <div id="errorBox" class="error-box hidden"></div>
      <div id="loadingBox" class="loading-box hidden">正在分析合同，请稍候...</div>
      <div id="resultContainer" class="result-container empty">
        <p>提交合同后，这里会展示摘要、抽取字段、风险清单、依据来源和修改建议。</p>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
